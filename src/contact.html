<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Subramani Pets Shop - About</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
}

/* NAVBAR */
.nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    background:#1e293b;
    color:white;
}

.nav h1 span{
    color:#38bdf8;
}

.side button{
    margin-left:15px;
    padding:8px 16px;
    border:none;
    background:#38bdf8;
    color:white;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

.side button:hover{
    background:#0284c7;
}

/* ABOUT SECTION */
.about-container{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:50px;
    padding:80px 60px;
    flex-wrap:wrap;
}

.about-text{
    max-width:600px;
}

.about-text h2{
    font-size:32px;
    margin-bottom:20px;
    color:#1e293b;
}

.about-text p{
    line-height:1.7;
    color:#555;
    font-size:18px;
}

.about-image-box{
    width:400px;
    height:350px;
    background:#f1f5f9;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.about-image-box img{
    max-width:90%;
    max-height:90%;
    object-fit:contain;
    filter:brightness(90%);
}

/* ADDRESS */
.address{
    text-align:center;
    padding:40px;
    background:white;
    margin:40px auto;
    max-width:700px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* CONTACT SECTION */
.contact-section{
    background:white;
    padding:60px;
    margin:50px auto;
    max-width:700px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.contact-section h2{
    text-align:center;
    margin-bottom:30px;
    color:#1e293b;
}

.contact-section input,
.contact-section textarea{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:16px;
}

.contact-section button{
    width:100%;
    padding:12px;
    border:none;
    background:#38bdf8;
    color:white;
    font-size:18px;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

.contact-section button:hover{
    background:#0284c7;
}

.success{
    text-align:center;
    color:green;
    margin-top:15px;
}

/* FOOTER */
.footer{
    background:#1e293b;
    color:white;
    text-align:center;
    padding:30px;
    margin-top:50px;
}

.footer a{
    color:#38bdf8;
    text-decoration:none;
    margin:0 8px;
}

.footer a:hover{
    text-decoration:underline;
}

@media(max-width:768px){
    .about-container{
        padding:40px 20px;
    }
    .nav{
        flex-direction:column;
        gap:15px;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
    <h1>Sub<span>ram</span>ani P<span>et</span>s S<span>ho</span>p</h1>
    <div class="side">
        <a href="index.html"><button>Home</button></a>
        <a href="product.html"><button>Pets</button></a>
        <a href="about.html"><button>About</button></a>
        <a href="contact.html"><button>Contact</button></a>
    </div>
</div>



<!-- CONTACT FORM -->
<div class="contact-section">
    <h2>Contact Us</h2>
    <form id="contactForm">
        <input type="text" id="name" placeholder="Your Name">
        <input type="email" id="email" placeholder="Your Email">
        <textarea id="message" rows="5" placeholder="Your Message"></textarea>
        <button type="submit">Send Message</button>
        <p class="success" id="successMsg"></p>
    </form>
</div>

<!-- FOOTER -->
<div class="footer">
    <p>© 2026 Subramani Pets Shop. All Rights Reserved.</p>
    <p>
        Follow us:
        <a href="#">Instagram</a> |
        <a href="#">Facebook</a> |
        <a href="#">Twitter</a>
    </p>
</div>

<!-- JAVASCRIPT -->
<script>
document.getElementById("contactForm").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let message = document.getElementById("message").value.trim();
    let successMsg = document.getElementById("successMsg");

    if(name === "" || email === "" || message === ""){
        alert("Please fill all fields!");
        return;
    }

    successMsg.textContent = "✅ Thank you! Your message has been sent successfully.";
    document.getElementById("contactForm").reset();
});
</script>

</body>
</html>
